gid: type._inputs.*.(color-input).options.alpha
url: /configuration-file/types/_inputs/*/(color-input)/options/alpha/
title: ''
description: >-
  This key toggles whether CloudCannon will show a control for adjusting the
  transparency of the selected color.


  Setting this key to `true` will show a control for adjusting the transparency
  of the selected color.


  If you do not set this key, CloudCannon shows the transparency control when
  the input key ends with "a", following the naming convention.
examples: []
show_in_navigation: false
