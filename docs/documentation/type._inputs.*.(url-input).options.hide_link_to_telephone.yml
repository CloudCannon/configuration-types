gid: type._inputs.*.(url-input).options.hide_link_to_telephone
url: >-
  /configuration-file/types/_inputs/*/(url-input)/options/hide_link_to_telephone/
title: ''
description: >-
  This key toggles whether CloudCannon will hide the option to link to a
  telephone number.


  Setting this key to `true` will hide the option to link to a telephone number.
  This does not prevent typing a `tel:` link in the input.
examples: []
show_in_navigation: false
