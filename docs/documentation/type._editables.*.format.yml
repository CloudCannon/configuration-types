gid: type._editables.*.format
url: /configuration-file/types/_editables/*/format/
title: ''
description: >-
  This key toggles whether CloudCannon will display a dropdown menu tool in your
  WYSIWYG toolbar for structured text.


  Setting this key to `true` displays the dropdown menu with the default
  formats. To restrict which formats appear, set this key to a space-separated
  string instead, for example `p h1 h2`.
examples: []
show_in_navigation: false
