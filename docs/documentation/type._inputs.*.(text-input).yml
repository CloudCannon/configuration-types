gid: type._inputs.*.(text-input)
url: /configuration-file/types/_inputs/*/(text-input)/
title: Text Input
description: |-
  This key defines an editing interface for plain text.

  *Text Inputs* use the `text` type and store a single line of text.
examples:
  - description: In this example, we have configured the `title` key as a *Text Input*.
    language: yaml
    code: |-
      _inputs:
        title:
          type: text
          label: Blog Title
    annotations: []
    source: /cloudcannon.config.yml
show_in_navigation: false
