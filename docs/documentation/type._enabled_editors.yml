gid: type._enabled_editors
url: /configuration-file/types/_enabled_editors/
title: ''
description: >-
  This key defines which editing interfaces are available by default for files
  at a given level of the configuration cascade.


  Whether an editing interface is available for a specific file is determined by
  other factors.


  Specifying one or more editing interfaces will disable all unspecified editing
  interfaces.


  You cannot disable the *Source Editor* with this key.


  If you do not set this key, all editing interfaces are available.


  If undefined at higher levels of the [configuration
  cascade](/documentation/articles/using-the-configuration-cascade/),
  `_enabled_editors` will default to any values configured in the [CloudCannon
  configuration
  file](/documentation/articles/what-is-the-cloudcannon-configuration-file/).


  For more information, please read our documentation on the [Visual
  Editor](/documentation/articles/what-is-the-visual-editor/), [Content

  Editor](/documentation/articles/what-is-the-content-editor/), [Data
  Editor](/documentation/articles/what-is-the-data-editor/), and [Source

  Editor](/documentation/articles/what-is-the-source-editor/).
examples:
  - description: >-
      In this example, we have enabled only the [Content
      Editor](/documentation/articles/what-is-the-content-editor/) in the `blog`
      *Collection*.
    language: yaml
    code: |-
      collections_config:
        blog:
          _enabled_editors:
            - content
    annotations: []
    source: /cloudcannon.config.yml
show_in_navigation: true
