gid: type._inputs.*.(code-input)
url: /configuration-file/types/_inputs/*/(code-input)/
title: Code Input
description: >-
  This key defines an editing interface for code or mono-spaced plain text
  content.


  *Code Inputs* use the `code` type and provide a syntax-highlighted code
  editor, with the language set by `options.syntax`.
examples:
  - description: >-
      In this example, we have configured the `custom_styles` key as a *Code
      Input* with CSS syntax highlighting.
    language: yaml
    code: |-
      _inputs:
        custom_styles:
          type: code
          options:
            syntax: css
    annotations: []
    source: /cloudcannon.config.yml
show_in_navigation: false
