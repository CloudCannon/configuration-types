gid: type.snippet.params.*.(repeating-parser-config).options.output_delimiter
url: >-
  /configuration-file/types/snippet/params/*/(repeating-parser-config)/options/output_delimiter/
title: ''
description: >-
  This key defines how to format the output for parsers such as the content and
  repeating parsers.

  Setting this key to `block` outputs values with leading and trailing newlines,
  and `inline` outputs values on a single line with newlines inserted as `\n`.
  If unspecified, `inline` is used when the value is a single line, otherwise
  `block` formatting is used.
examples: []
