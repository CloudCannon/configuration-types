title: Snippet Definition Value
description: >-
  This key represents a reusable value that can be referenced in snippet
  templates via `{ ref: "key" }` or `{ spread_ref: "key" }`. It can be a string,
  number, boolean, parser format, parser model, array of models, or array of
  select options.
