gid: type._inputs.*.(range-input)
url: /configuration-file/types/_inputs/*/(range-input)/
title: Range Input
description: >-
  This key defines an editing interface for selecting a numeric value with a
  slider.


  *Range Inputs* use the `range` type and store a number, like *Number Inputs*,
  but present a slider control instead of a numeric field.
