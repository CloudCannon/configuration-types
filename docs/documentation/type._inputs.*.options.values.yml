gid: type._inputs.*.options.values
url: /configuration-file/types/_inputs/*/options/values/
title: ''
description: >-
  This key defines the values available to choose from.


  If you do not set this key, CloudCannon fetches values from the naming
  convention (for example `colors` or `my_colors` for the data set `colors`).
examples:
  - description: >-
      In this example, we have configured a *Select Input* with custom values to
      choose from.
    language: yaml
    code: |-
      _inputs:
        category:
          type: select
          options:
            values:
              - Blog
              - News
              - Events
    annotations: []
    source: /cloudcannon.config.yml
show_in_navigation: false
