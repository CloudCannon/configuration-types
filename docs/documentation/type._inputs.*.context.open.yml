gid: type._inputs.*.context.open
url: /configuration-file/types/_inputs/*/context/open/
title: ''
description: >-
  This key toggles whether the context box is open to display its text content
  when an editor first opens the input.


  Setting this key to `true` will open the context box automatically.
examples:
  - description: >-
      In this example, we want the context box to be open by default so users
      can immediately see the help information.
    language: yaml
    code: |-
      _inputs:
        seo_description:
          type: text
          label: SEO Description
          context:
            open: true
            title: SEO Guidelines
            icon: info
            content: Keep descriptions between 150-160 characters for optimal search engine display.
    annotations: []
    source: /cloudcannon.config.yml
show_in_navigation: false
