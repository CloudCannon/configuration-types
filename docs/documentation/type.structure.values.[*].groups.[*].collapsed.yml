gid: type.structure.values.[*].groups.[*].collapsed
url: /configuration-file/types/structure/values/[*]/groups/[*]/collapsed/
title: ''
description: >-
  This key toggles whether a group is collapsed when first viewed.


  Setting this key to `true` will display the group collapsed; otherwise
  CloudCannon displays it expanded.
examples:
  - description: >-
      In this example, we have configured the "Details" group to be collapsed by
      default.
    language: yaml
    code: |-
      _structures:
        article_information:
          values:
            - label: Blog
              value:
                title:
                subtitle:
                author:
              groups:
                - heading: Titles
                  collapsed: true
                  inputs:
                    - title
                    - subtitle
                - heading: Details
                  inputs:
                    - author
    annotations: []
    source: /cloudcannon.config.yml
show_in_navigation: false
