gid: type.documentation
url: /configuration-file/types/documentation/
title: ''
description: >-
  This key defines a documentation link that CloudCannon shows to your team
  members, pointing them to guidance relevant to what they are editing.


  Where the link appears depends on where you set this key — for example, at the
  top of a *Collection Browser*, above an *Input*, or beside a *Structure* value
  in the *Data Editor*.
examples:
  - description: >-
      In this example, the documentation link for the `data` *Collection* goes
      to [CloudCannon Documentation](/documentation/).
    language: yaml
    code: |-
      collections_config:
        data:
          documentation:
            url: https://cloudcannon.com/documentation/
            text: CloudCannon Documentation
            icon: star
    annotations: []
    source: /cloudcannon.config.yml
show_in_navigation: true
