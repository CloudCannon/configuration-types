gid: type._inputs.*.options.value_key
url: /configuration-file/types/_inputs/*/options/value_key/
title: ''
description: >-
  This key defines the key used for mapping between saved values and objects in
  `values`.


  This changes how the *Input* saves selected values to match.


  If you do not set this key, CloudCannon checks for `id`, `uuid`, `path`,
  `title`, then `name`.


  This key has no effect unless `values` is an array of objects. For objects,
  CloudCannon uses this key; for primitive types, it uses the value itself.
examples: []
