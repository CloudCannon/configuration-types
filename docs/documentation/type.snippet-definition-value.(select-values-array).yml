gid: type.snippet-definition-value.(select-values-array)
url: /configuration-file/types/snippet-definition-value/(select-values-array)/
title: Select Values Array
description: >-
  This key represents an array of select option values. It is commonly used for
  language lists in code-highlighting snippets, where each option has a display
  name and a value, for example `[{ name: "JavaScript", value: "js" }, { name:
  "Python", value: "python" }]`.
