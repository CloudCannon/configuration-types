gid: collections_config.*.add_options.[*].(add-option).collection
url: >-
  /configuration-file/collections_config/*/add_options/[*]/(add-option)/collection/
title: ''
description: >-
  This key defines the *Collection* for files created using an option in the *\+
  Add* button dropdown.


  This *Collection* overrides the current *Collection* open in the *Collection
  Browser*.


  The value for this key should be the key name of a *Collection*.


  If you do not set this key, CloudCannon uses the current *Collection* open in
  the *Collection Browser*.
examples:
  - description: >-
      In this example, we want team members in the articles *Collection* to
      create new files in the `new_articles` *Collection* rather than the
      current *Collection Browser* they have open. By configuring the
      `collection` value to `new_articles`, new files will be created in a
      different *Collection* (i.e., `new_articles`) when a team member selects
      this option from the + Add button dropdown.
    language: yaml
    code: |-
      collections_config:
        articles:
          add_options:
            - name: Add articles
              collection: new_articles
              schema: articles
    annotations: []
    source: /cloudcannon.config.yml
show_in_navigation: false
